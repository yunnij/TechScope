<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechScope | 기업 기술블로그 대시보드</title>
    <meta name="description" content="기업 기술블로그 신규 글 대시보드" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <main class="layout">
      <header class="hero">
        <section class="hero-copy-block">
          <div class="hero-topbar">
            <p class="eyebrow">TechScope</p>
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="다크모드 전환">
              <span class="theme-toggle-text">다크모드</span>
            </button>
          </div>
          <h1>주니어 개발자를 위한<br />기술블로그 레이더</h1>
          <p class="hero-copy">
            여러 IT 기업 기술블로그를 매일 수집하고, 회사/분야 필터와 시간 탭으로 빠르게 탐색하는 대시보드입니다.
          </p>
          <div class="range-tabs" role="tablist" aria-label="기간 필터">
            <button class="range-tab is-active" type="button" role="tab" aria-selected="true" data-range="all">전체</button>
            <button class="range-tab" type="button" role="tab" aria-selected="false" data-range="today">오늘</button>
            <button class="range-tab" type="button" role="tab" aria-selected="false" data-range="week">이번 주</button>
          </div>
        </section>

        <aside class="hero-panel" aria-label="상태 요약">
          <div class="stat">
            <span class="label">서비스 상태</span>
            <strong id="statusText">불러오는 중...</strong>
          </div>
          <div class="stat">
            <span class="label">총 게시글</span>
            <strong id="totalCount">-</strong>
          </div>
          <div class="stat">
            <span class="label">마지막 업데이트</span>
            <strong id="lastLoadedAt">-</strong>
          </div>
        </aside>
      </header>

      <section class="topic-filter-panel" aria-label="분야 카테고리 필터">
        <div class="topic-filter-head">
          <div>
            <p class="mini-label">분야별 카테고리</p>
            <h2>카테고리 선택</h2>
          </div>
          <button id="refreshBtn" class="refresh-btn" type="button">필터 초기화</button>
        </div>
        <div id="topicChipList" class="topic-chip-list" role="listbox" aria-label="분야 선택"></div>
      </section>

      <section id="activeFilters" class="active-filters" aria-live="polite"></section>

      <div class="app-shell">
        <aside class="sidebar-panel" aria-label="기업 목록">
          <div class="sidebar-head">
            <p class="mini-label">회사 필터</p>
            <h2>기업 선택</h2>
          </div>
          <div id="companyTabList" class="company-tab-list" role="tablist" aria-label="기업 필터"></div>
        </aside>

        <section class="main-column">
          <section class="content-block">
            <div class="section-head">
              <h2>최신 글</h2>
              <p id="resultSummary">-</p>
            </div>
            <div id="postGrid" class="post-grid" aria-live="polite"></div>
            <div id="emptyState" class="empty-state hidden">
              <p>표시할 게시글이 없습니다.</p>
              <small>기업/분야/기간 필터를 변경하거나 크롤러를 실행해 보세요.</small>
            </div>
            <nav id="postPagination" class="pagination hidden" aria-label="게시글 페이지네이션"></nav>
          </section>

          <section class="content-block source-status">
            <div class="section-head">
              <h2>수집 대상 기업 상태</h2>
              <div class="section-head-actions">
                <p>RSS 준비 여부를 빠르게 확인할 수 있습니다.</p>
                <button id="sourceStatusToggle" class="ghost-toggle-btn" type="button" aria-expanded="true">
                  숨기기
                </button>
              </div>
            </div>
            <div id="sourceList" class="source-list"></div>
          </section>
        </section>
      </div>
    </main>

    <template id="postCardTemplate">
      <article class="post-card">
        <div class="post-card-head">
          <div class="company-meta">
            <span class="company-avatar" aria-hidden="true"></span>
            <span class="company-chip"></span>
          </div>
          <span class="topic-chip"></span>
        </div>
        <h3 class="post-title">
          <a class="post-title-link" target="_blank" rel="noopener noreferrer"></a>
        </h3>
        <p class="post-summary"></p>
        <div class="post-meta">
          <time class="post-date"></time>
          <button class="copy-link-btn" type="button" aria-label="링크 복사" title="링크 복사">
            <span class="copy-link-emoji" aria-hidden="true">🔗</span>
          </button>
        </div>
      </article>
    </template>

    <div id="copyToast" class="copy-toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="/app.js"></script>
  </body>
  </html>
